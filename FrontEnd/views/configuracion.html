<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración</title>
    
    <!-- Fuente principal (Poppins) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Estilos generales + estilos específicos del panel -->
    <link rel="stylesheet" href="/assets/css/estilos_configuracion.css"> 
    <link rel="stylesheet" href="/assets/css/estilos_general.css"> 
    
    <!-- Librería de íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- =====================================================================================
         SIDEBAR VERTICAL (Menú lateral)
         Contiene iconos que funcionan como navegación principal del sistema.
    ====================================================================================== -->
    <div class="sidebar">
        <nav class="sidebar-menu">
            <a href="inicio.html">
                <img src="/assets/icons/ico_inicio.png" class="icon-custom">
            </a>    

            <a href="panel_notificaciones.html">
                <img src="/assets/icons/ico_panel_notificaciones.png" class="icon-custom">
            </a>

            <a href="historial_actividad.html">
                <img src="/assets/icons/ico_historiall_actividad.png" class="icon-custom">
            </a>
            
            <a href="panel_gestion_remota.html">
                <img src="/assets/icons/ico_panel_gestion_remota.png" class="icon-custom">
            </a>

            <!-- Elemento activo -->
            <a href="configuracion.html" class="active">
                <img src="/assets/icons/ico_configuracion.png" class="icon-custom">
            </a>

            <a href="#" onclick="cerrarSesion()">
                <img src="/assets/icons/ico_logout.svg" class="icon-custom">
            </a>
        </nav>

        <div class="sidebar-vertical-line"></div>
    </div>

    <!-- =====================================================================================
         TOP SIDEBAR (Barra superior)
         Muestra datos del usuario, menú hamburguesa y selector fecha/hora.
    ====================================================================================== -->
    <div class="top-sidebar">

        <div class="top-left">

            <!-- Menú tipo hamburguesa (abre/cierra sidebar) -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Foto y datos del usuario -->
            <img src="/assets/img/foto_usuario.JPG" alt="Foto Usuario" class="user-photo">

            <div class="user-info">
                <span class="user-name">Yesid Colmenares</span>
                <span class="user-role">Administrador</span>
            </div>

            <!-- Logo o nombre del sistema -->
            <img src="/assets/img/nombre_logo.png" class="end-png">
        </div>

        <hr class="divider">

        <!-- Selector de fecha y hora (solo lectura) -->
        <div class="period-selector">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha" name="fecha" readonly>

            <label for="hora">Hora:</label>
            <input type="time" id="hora" name="hora" readonly>
        </div>
    </div>

    <!-- =====================================================================================
         PANEL PRINCIPAL DE CONFIGURACIÓN
         Espacio donde se muestran las opciones de rol y configuración general.
    ====================================================================================== -->
    <div class="dashboard-panel">
    <h2 class="panel-title">Configuración</h2>
        <div class="boxes-horizontal-container">
            <h4 class="sub-panel-title">Asignar o cambiar rol</h4>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/assets/js/slidebar.js"></script>
    <script src="/assets/js/fecha_hora_actual.js"></script>
    <script src="/assets/js/sideban.js"></script>ipt>
    <script src="/assets/js/configuracion.js"></script>
</body>
</html>
