<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta</title>
    
    <!-- Fuente principal del proyecto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Estilos generales y estilos específicos de la vista -->
    <link rel="stylesheet" href="/assets/css/estilos_login.css">
    <link rel="stylesheet" href="/assets/css/estilos_crear_cuenta.css">

    <!-- Íconos (FontAwesome) -->
    <link rel="stylesheet" 
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <!-- Fondo con efecto estático -->
    <div class="bg-fixed"></div>

    <!-- Contenedor principal que divide menú y panel derecho -->
    <div class="container">

        <!-- Barra de navegación izquierda (nombre + opciones) -->
        <div class="nav-var">
            <h1 class="brand-title">
                Peripheral <br> Security
            </h1>
            
            <nav class="menu">
                <a href="iniciar_sesion.html">Iniciar sesión</a>
                <a href="crear_cuenta.html" class="active">Crear cuenta</a>
            </nav>
        </div>

        <!-- Footer izquierdo (texto de bienvenida) -->
        <div class="footer">
            <h2 class="welcome">¡Qué gusto verte de nuevo!</h2>
        </div>

        <!-- PANEL DERECHO (formulario de registro) -->
        <div class="right-panel">

            <!-- Encabezado del panel derecho -->
            <div class="right-panel-header">
                <h2 class="right-panel-title">Crear cuenta</h2>
                <img src="/assets/img/logo.png" alt="Logo" class="right-panel-logo">
            </div>
            

            <!-- FORMULARIO COMPLETO -->
            <form class="right-panel-form">

                <!-- Fila: nombres y apellidos -->
                <div class="form-row">
                    <div class="field">
                        <label>Nombres</label>
                        <div class="input-group">
                            <input type="text" placeholder="Tu nombre">
                        </div>
                    </div>

                    <div class="field">
                        <label>Apellidos</label>
                        <div class="input-group">
                            <input type="text" placeholder="Tu apellido">
                        </div>
                    </div>
                </div>

                <!-- Campo: cédula -->
                <div class="field">
                    <label>Cedula</label>
                    <div class="input-group">
                        <input type="text" placeholder="Tu cédula">
                    </div>
                </div>

                <!-- Campo: fecha de nacimiento (3 inputs compactos) -->
                <label>Fecha de nacimiento</label>
                <div class="date-row">

                    <div class="date-field">
                        <label>Día</label>
                        <input type="number" placeholder="01" min="1" max="31">
                    </div>

                    <div class="date-field">
                        <label>Mes</label>
                        <input type="number" placeholder="12" min="1" max="12">
                    </div>

                    <div class="date-field">
                        <label>Año</label>
                        <input type="number" placeholder="2001" min="1900" max="2025">
                    </div>

                </div>

                <!-- Campo correo -->
                <div class="field">
                    <label>Dirección de correo</label>
                    <div class="input-group">
                        <input type="email" placeholder="Tu correo electrónico">
                    </div>
                </div>

                <!-- Fila: contraseña y confirmar contraseña -->
                <div class="form-row">
                    <div class="field">
                        <label>Contraseña</label>
                        <div class="input-group">
                            <input type="password" placeholder="Tu clave">
                        </div>
                    </div>

                    <div class="field">
                        <label>Confirmar</label>
                        <div class="input-group">
                            <input type="password" placeholder="Confirma tu clave">
                        </div>
                    </div>
                </div>

                <!-- Botón principal -->
                <button type="button" class="btn-primary">Crear cuenta</button>

                <!-- Divider visual -->
                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Botón alternativo -->
                <button type="button" class="btn-secondary">Iniciar sesión</button>

            </form>
        </div>
    </div>

<script src="/assets/js/crear_cuenta.js"></script>
</body>
</html>
