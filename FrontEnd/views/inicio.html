<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Dashboard</title>

    <!-- Fuente principal -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/assets/css/estilos_inicio.css">
    <link rel="stylesheet" href="/assets/css/estilos_general.css"> 

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <!-- ========== SIDEBAR IZQUIERDO ========== -->
    <div class="sidebar">
        <nav class="sidebar-menu">

            <!-- Opción activa -->
            <a href="inicio.html" class="active">
                <img src="/assets/icons/ico_inicio.png" class="icon-custom">
            </a>    

            <a href="panel_notificaciones.html">
                <img src="/assets/icons/ico_panel_notificaciones.png" class="icon-custom">
            </a>

            <a href="historial_actividad.html">
                <img src="/assets/icons/ico_historiall_actividad.png" class="icon-custom">
            </a>
            
            <a href="panel_gestion_remota.html">
                <img src="/assets/icons/ico_panel_gestion_remota.png" class="icon-custom">
            </a>

            <a href="configuracion.html">
                <img src="/assets/icons/ico_configuracion.png" class="icon-custom">
            </a>

            <a href="#" onclick="cerrarSesion()">
                <img src="/assets/icons/ico_logout.svg" class="icon-custom">
            </a>
        </nav>

        <div class="sidebar-vertical-line"></div>
    </div>



    <!-- ========== HEADER SUPERIOR ========== -->
    <div class="top-sidebar">

        <div class="top-left">
            <!-- Menú móvil -->
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Usuario -->
            <img src="/assets/img/foto_usuario.JPG" alt="Foto Usuario" class="user-photo">

            <div class="user-info">
                <span class="user-name">Yesid Colmenares</span>
                <span class="user-role">Administrador</span>
            </div>

            <!-- Logo lateral -->
            <img src="/assets/img/nombre_logo.png" class="end-png">
        </div>

        <hr class="divider">

        <!-- Fecha y hora del sistema -->
        <div class="period-selector">
            <label>Fecha:</label>
            <input type="date" id="fecha" readonly>

            <label>Hora:</label>
            <input type="time" id="hora" readonly>
        </div>
    </div>



    <!-- ========== PANEL PRINCIPAL ========== -->
    <div class="dashboard-panel">

        <!-- MÉTRICAS PRINCIPALES -->
        <div class="boxes-container">

            <div class="box">
                <img src="/assets/icons/ico_desconexiones_totales.png" class="box-icon">
                <p class="box-text-small">Desconexiones totales</p>
                <p class="box-text-large">123</p>
            </div>

            <div class="box">
                <img src="/assets/icons/ico_desconexiones_dia.png" class="box-icon">
                <p class="box-text-small">Desconexiones del día</p>
                <p class="box-text-large">45</p>
            </div>

            <div class="box">
                <img src="/assets/icons/ico_dispositivos_activos.png" class="box-icon">
                <p class="box-text-small">Dispositivos activos</p>
                <p class="box-text-large">78</p>
            </div>

            <div class="box">
                <img src="/assets/icons/ico_dispositivos_inactivos.png" class="box-icon">
                <p class="box-text-small">Dispositivos inactivos</p>
                <p class="box-text-large">12</p>
            </div>

        </div>



        <!-- GRÁFICOS -->
        <div class="chart-wrapper">
            <canvas id="graficoDesconexiones"></canvas>
        </div>

        <div class="chart-wrapper">
            <canvas id="graficoPerifericos"></canvas>
        </div>
    </div>



    <!-- ========== SCRIPTS ========== -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/assets/js/dashboard.js"></script>
    <script src="/assets/js/slidebar.js"></script>
    <script src="/assets/js/fecha_hora_actual.js"></script>
    <script src="/assets/js/sideban.js"></script>

</body>
</html>
